stages:
  - test
  - deploy

default:
  image: docker-registry.int.rclabenv.com:443/library/node:20
  tags:
    - lab
  before_script:
    # Use internal npm registry (external npm is not allowed)
    - npm config set registry https://nexus.int.rclabenv.com/nexus/content/groups/npm-all/

variables:
  NPM_CONFIG_REGISTRY: "https://nexus.int.rclabenv.com/nexus/content/groups/npm-all/"

cache:
  key: "${CI_PROJECT_NAME}-npm-cache"
  paths:
    - frontend/node_modules/

# ---- Backend unit tests (Zig) ----
test:zig:
  stage: test
  image: docker-registry.int.rclabenv.com:443/library/alpine:3.19
  tags:
    - lab
  before_script:
    - apk add --no-cache curl xz
    - curl -L https://ziglang.org/download/0.16.0/zig-linux-x86_64-0.16.0.tar.xz -o zig.tar.xz
    - tar -xf zig.tar.xz
    - export PATH="$PWD/zig-linux-x86_64-0.16.0:$PATH"
    - zig version
  script:
    - cd backend
    - zig build test
  allow_failure: true   # Zig download may be blocked in RC network

# ---- Frontend unit tests (vitest) ----
test:frontend:
  stage: test
  script:
    - cd frontend
    - npm install
    - npm test
  allow_failure: false

# ---- GitLab Pages (demo UI) ----
pages:
  stage: deploy
  script:
    - cd frontend
    - npm install
    - npm run build -- --base=/francis-peng-vpn/
    - cp -r dist ../public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - test:frontend
