stages:
  - test
  - deploy

default:
  image: docker-registry.int.rclabenv.com:443/library/node:20
  tags:
    - lab
  before_script:
    # Use internal npm registry (external npm is not allowed)
    - npm config set registry https://nexus.int.rclabenv.com/nexus/content/groups/npm-all/

variables:
  NPM_CONFIG_REGISTRY: "https://nexus.int.rclabenv.com/nexus/content/groups/npm-all/"

cache:
  key: "${CI_PROJECT_NAME}-npm-cache"
  paths:
    - frontend/node_modules/

# ---- Frontend unit tests (vitest) ----
test:frontend:
  stage: test
  script:
    - cd frontend
    - npm install
    - npm test
  allow_failure: false

# ---- GitLab Pages (demo UI) ----
pages:
  stage: deploy
  script:
    - cd frontend
    - npm install
    - npm run build -- --base=/francis-peng-vpn/
    - cp -r dist ../public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - test:frontend
