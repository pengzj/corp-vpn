stages:
  - test
  - deploy

# ---- Backend unit tests (Zig) ----
test:zig:
  stage: test
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl xz
    - curl -L https://ziglang.org/download/0.16.0/zig-linux-x86_64-0.16.0.tar.xz -o zig.tar.xz
    - tar -xf zig.tar.xz
    - export PATH="$PWD/zig-linux-x86_64-0.16.0:$PATH"
    - zig version
  script:
    - cd backend
    - zig build test
  allow_failure: false

# ---- Frontend unit tests (vitest) ----
test:frontend:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - npm install
    - npm test
  allow_failure: false

# ---- GitLab Pages (demo UI) ----
pages:
  stage: deploy
  image: node:20-alpine
  script:
    - cd frontend
    - npm install
    - npm run build -- --base=/francis-peng-vpn/
    - cp -r dist ../public
  artifacts:
    paths:
      - public
  only:
    - main
  needs:
    - test:frontend
